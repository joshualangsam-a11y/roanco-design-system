<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Accent scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0a0a0a;color:#ededed;font-family:var(--font-sans);overflow:hidden}
  .stage{position:relative;height:100vh;min-height:320px;padding:26px 30px;display:flex;flex-direction:column;gap:22px}

  /* grain */
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.035;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

  .head{display:flex;align-items:baseline;gap:14px}
  .head .num{font-family:var(--font-mono);font-size:10px;letter-spacing:.25em;color:#ff6ec7}
  .head .title{font-family:var(--font-serif);font-size:26px;letter-spacing:-.02em;line-height:1;background:linear-gradient(90deg,#ff6ec7 0%,#ffa45c 45%,#5ee1ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .head .sub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(237,237,237,.5);margin-left:auto}

  /* continuous gradient bar (the "smoother" part) */
  .bar{position:relative;height:94px;border-radius:10px;overflow:hidden;
    background:linear-gradient(90deg,
      #ff2d9c 0%,    /* hot miami pink */
      #ff6ec7 15%,   /* flamingo */
      #ff8a5c 32%,   /* peach */
      #ffc65c 48%,   /* sunset */
      #ffe36a 58%,   /* sand */
      #5ee1ff 75%,   /* ocean cyan */
      #3aa3e0 92%,   /* deco teal */
      #2a5fb0 100%   /* dusk indigo */
    );
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.06), 0 0 48px -12px rgba(255,110,199,.25)}

  /* 7 tick stops overlaid on the gradient */
  .ticks{position:absolute;inset:0;display:grid;grid-template-columns:repeat(7,1fr)}
  .tk{position:relative;border-right:1px solid rgba(10,10,10,.18)}
  .tk:last-child{border-right:none}
  .tk::before{content:"";position:absolute;top:0;left:0;width:1px;height:10px;background:rgba(10,10,10,.45)}
  .tk .lab{position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;color:rgba(10,10,10,.7);font-weight:500}
  .tk .hex{position:absolute;bottom:8px;left:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.02em;color:rgba(10,10,10,.85);font-weight:600}

  /* bottom row: role chips */
  .roles{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .role{background:#141414;border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px}
  .role .sw{width:28px;height:28px;border-radius:6px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .role .meta{display:flex;flex-direction:column;gap:2px;min-width:0}
  .role .tag{font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:rgba(237,237,237,.55)}
  .role .nm{font-family:var(--font-mono);font-size:11px;color:#ededed;letter-spacing:.02em}

  /* footer readout */
  .foot{display:flex;justify-content:space-between;align-items:center;padding-top:2px;
    font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;color:rgba(237,237,237,.35)}
  .foot span em{font-style:normal;color:#ff6ec7}
</style></head><body>
<div class="stage">

  <div class="head">
    <span class="num">02</span>
    <span class="title">Accent · Miami dusk</span>
    <span class="sub">8-stop continuous gradient</span>
  </div>

  <div class="bar">
    <div class="ticks">
      <div class="tk"><span class="lab">05</span><span class="hex">#FF2D9C</span></div>
      <div class="tk"><span class="lab">20</span><span class="hex">#FF6EC7</span></div>
      <div class="tk"><span class="lab">40</span><span class="hex">#FF8A5C</span></div>
      <div class="tk"><span class="lab">55</span><span class="hex">#FFC65C</span></div>
      <div class="tk"><span class="lab">70</span><span class="hex">#FFE36A</span></div>
      <div class="tk"><span class="lab">82</span><span class="hex">#5EE1FF</span></div>
      <div class="tk"><span class="lab">95</span><span class="hex">#2A5FB0</span></div>
    </div>
  </div>

  <div class="roles">
    <div class="role"><div class="sw" style="background:#ff2d9c"></div><div class="meta"><span class="tag">Primary</span><span class="nm">--accent</span></div></div>
    <div class="role"><div class="sw" style="background:#ff8a5c"></div><div class="meta"><span class="tag">Warm</span><span class="nm">--accent-warm</span></div></div>
    <div class="role"><div class="sw" style="background:#5ee1ff"></div><div class="meta"><span class="tag">Cool</span><span class="nm">--accent-cool</span></div></div>
    <div class="role"><div class="sw" style="background:linear-gradient(90deg,#ff2d9c,#5ee1ff)"></div><div class="meta"><span class="tag">Signature</span><span class="nm">--accent-grad</span></div></div>
  </div>

  <div class="foot">
    <span>oklch · interpolated · <em>smooth</em></span>
    <span>miami · deco · retrowave</span>
  </div>

</div>
</body></html>
