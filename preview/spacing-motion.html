<!DOCTYPE html><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-sans);margin:0}
  .wrap{padding:22px 28px;display:grid;gap:12px}
  .row{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:14px}
  .key{font-family:var(--font-mono);font-size:10px;color:var(--text);letter-spacing:.06em}
  .val{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
  .track{height:12px;background:rgba(255,255,255,.04);border-radius:6px;position:relative;overflow:hidden}
  .pip{position:absolute;top:2px;left:0;width:8px;height:8px;background:var(--accent);border-radius:50%}
  @keyframes inout{0%{left:0}50%{left:calc(100% - 8px)}100%{left:0}}
  .a{animation:inout 1800ms cubic-bezier(.76,0,.24,1) infinite}
  .b{animation:inout 1800ms cubic-bezier(.25,.1,.25,1) infinite}
</style></head><body>
<div class="wrap">
  <div class="row"><div><div class="key">ease-in-out</div><div class="val">[.76, 0, .24, 1]</div></div><div class="track"><div class="pip a"></div></div></div>
  <div class="row"><div><div class="key">ease-standard</div><div class="val">[.25, .1, .25, 1]</div></div><div class="track"><div class="pip b"></div></div></div>
  <div class="row"><div class="key">fadeIn</div><div class="val">spring · damp 25 · stiff 150 · y 40→0</div></div>
  <div class="row"><div class="key">counter</div><div class="val">2000ms · ease-standard · once in-view</div></div>
  <div class="row"><div class="key">card hover</div><div class="val">400ms · border + translateY(-4px) + shadow</div></div>
</div>
</body></html>
