<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:var(--bg);color:var(--text);font-family:var(--font-sans);margin:0}
  .wrap{padding:22px 28px;display:flex;gap:22px;align-items:flex-end}
  .sw{text-align:center}
  .box{width:92px;height:72px;background:var(--bg-elevated);border:1px solid var(--border)}
  .name{font-family:var(--font-mono);font-size:10px;color:var(--text);margin-top:10px;letter-spacing:.06em}
  .hex{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-top:2px}
  .use{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.18em;margin-top:2px}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="box" style="border-radius:6px"></div><div class="name">--radius-sm</div><div class="hex">6px</div><div class="use">Tech pill</div></div>
  <div class="sw"><div class="box" style="border-radius:8px"></div><div class="name">--radius-md</div><div class="hex">8px</div><div class="use">Card / Button</div></div>
  <div class="sw"><div class="box" style="border-radius:9px"></div><div class="name">--radius-lg</div><div class="hex">9px</div><div class="use">Testimonial</div></div>
</div>
</body></html>
